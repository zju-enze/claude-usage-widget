<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claude Usage</title>
  </head>
  <body>
    <div id="widget" data-tauri-drag-region>
      <header data-tauri-drag-region>
        <span class="title" data-tauri-drag-region>Claude Usage</span>
        <div class="header-actions">
          <button id="btn-refresh" title="刷新">⟳</button>
          <button id="btn-collapse" title="折叠/展开">−</button>
          <button id="btn-close" title="关闭">×</button>
        </div>
      </header>

      <main id="content">
        <section class="bar-block" id="block-5h">
          <div class="bar-label">
            <span class="left">5 小时</span>
            <span class="right" id="fiveHour-pct">—</span>
          </div>
          <div class="bar-bg">
            <div class="bar-fill" id="fiveHour-fill" style="width:0%"></div>
          </div>
          <div class="bar-sub" id="fiveHour-resets">—</div>
        </section>

        <section class="bar-block" id="block-7d">
          <div class="bar-label">
            <span class="left">7 天</span>
            <span class="right" id="sevenDay-pct">—</span>
          </div>
          <div class="bar-bg">
            <div class="bar-fill" id="sevenDay-fill" style="width:0%"></div>
          </div>
          <div class="bar-sub" id="sevenDay-resets">—</div>
        </section>

        <div id="model-block" style="display:none;margin-top:6px;font-size:10px;color:var(--fg-dim);">
          模型 <span id="model-name">—</span>
        </div>

        <details id="block-models">
          <summary>各模型剩余 %</summary>
          <div id="models-list"></div>
        </details>

        <div class="status" id="status">等待数据…</div>
      </main>
    </div>

    <script src="main.js" defer></script>
    <script>
      // 超级内联诊断：load 完立刻调 invoke，看是否生效
      window.addEventListener("DOMContentLoaded", function() {
        try {
          if (window.__TAURI__ && window.__TAURI__.core) {
            window.__TAURI__.core.invoke("frontend_log", { level: "info", msg: "INLINE_OK_DOM_READY" });
          } else {
            // 说明 __TAURI__ 还没注入到 window 上，等 200ms 再试
            setTimeout(function() {
              if (window.__TAURI__ && window.__TAURI__.core) {
                window.__TAURI__.core.invoke("frontend_log", { level: "info", msg: "INLINE_OK_DELAYED" });
              } else {
                // WebView 完全没注入 __TAURI__ global - 这是 dev mode 的典型坑
                document.body.style.background = "#911";
                document.body.innerHTML += '<pre style="color:white;padding:8px;font-size:10px">[FE_TAURI_MISSING]</pre>';
              }
            }, 200);
          }
        } catch (e) {
          document.body.style.background = "#911";
          document.body.innerHTML += '<pre style="color:white;padding:8px;font-size:10px">[FE_JS_ERR] ' + e.message + '</pre>';
        }
      });
    </script>
  </body>
</html>

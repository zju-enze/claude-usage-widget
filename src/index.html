<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <link rel="stylesheet" href="styles.css" />
    <title>Claude Usage Widget</title>
  </head>
  <body>
    <div id="widget" data-tauri-drag-region>
      <div class="liquid-glass" aria-hidden="true">
        <span class="liquid-caustic"></span>
        <span class="liquid-rim"></span>
      </div>

      <header id="widget-header" data-tauri-drag-region>
        <div class="title" data-tauri-drag-region>
          <span class="app-icon" data-tauri-drag-region aria-hidden="true">
            <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2 L4 6 L4 14 C4 18 7.5 21 12 22 C16.5 21 20 18 20 14 L20 6 Z" />
            </svg>
          </span>
          <span class="title-text" data-tauri-drag-region>Claude Usage</span>
          <span class="connection-state" data-tauri-drag-region>
            <span class="dot state-idle" id="status-dot" aria-hidden="true"></span>
            <span id="connection-status" aria-live="polite">待同步</span>
          </span>
        </div>

        <div class="header-actions">
          <button id="btn-refresh" class="icon-btn" type="button" title="刷新用量" aria-label="刷新用量">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12a9 9 0 1 1-3-6.7" />
              <polyline points="21 4 21 10 15 10" />
            </svg>
          </button>
          <button id="btn-collapse" class="glass-text-btn" type="button" title="收起小组件" aria-label="收起小组件" aria-expanded="true">收起</button>
          <button id="btn-close" class="icon-btn icon-btn-close" type="button" title="隐藏小组件" aria-label="隐藏小组件">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
              <line x1="6" y1="6" x2="18" y2="18" />
              <line x1="18" y1="6" x2="6" y2="18" />
            </svg>
          </button>
        </div>
      </header>

      <main id="content" aria-busy="false">
        <section class="usage-block" aria-labelledby="five-hour-label">
          <div class="usage-heading">
            <h2 id="five-hour-label">5 小时</h2>
            <output class="pct-tag" id="fiveHour-pct">等待数据</output>
          </div>
          <div
            class="bar-track"
            id="fiveHour-track"
            role="progressbar"
            aria-labelledby="five-hour-label"
            aria-describedby="fiveHour-resets"
            aria-valuemin="0"
            aria-valuemax="100"
            aria-valuetext="暂无数据"
          >
            <div class="bar-fill" id="fiveHour-fill">
              <span class="bar-fill-gloss"></span>
            </div>
          </div>
          <p class="bar-sub" id="fiveHour-resets">等待首次同步</p>
        </section>

        <section class="usage-block" aria-labelledby="seven-day-label">
          <div class="usage-heading">
            <h2 id="seven-day-label">7 天</h2>
            <output class="pct-tag" id="sevenDay-pct">等待数据</output>
          </div>
          <div
            class="bar-track"
            id="sevenDay-track"
            role="progressbar"
            aria-labelledby="seven-day-label"
            aria-describedby="sevenDay-resets"
            aria-valuemin="0"
            aria-valuemax="100"
            aria-valuetext="暂无数据"
          >
            <div class="bar-fill" id="sevenDay-fill">
              <span class="bar-fill-gloss"></span>
            </div>
          </div>
          <p class="bar-sub" id="sevenDay-resets">等待首次同步</p>
        </section>

        <section class="meta-panel" aria-label="连接信息">
          <div class="meta-row" id="model-row">
            <span class="meta-row-label">当前模型</span>
            <span class="model-pill is-empty" id="model-name" title="未检测到">未检测到</span>
          </div>
          <div class="meta-footer">
            <span id="last-updated">尚未同步</span>
            <button id="btn-manage-key" class="link-btn" type="button">连接设置</button>
          </div>
        </section>
      </main>

      <section
        class="setup-overlay hidden"
        id="setup-overlay"
        role="dialog"
        aria-modal="true"
        aria-labelledby="setup-title"
        aria-describedby="setup-description setup-security"
        aria-hidden="true"
      >
        <form id="setup-form" class="setup-card" novalidate>
          <p class="setup-eyebrow">安全连接</p>
          <h1 class="setup-title" id="setup-title">连接 MiniMax</h1>
          <p class="setup-description" id="setup-description">输入你的 MiniMax API Key，以读取 Coding Plan 用量。</p>

          <div
            class="provider-picker"
            id="provider-picker"
            role="radiogroup"
            aria-label="选择用量服务"
            aria-describedby="provider-picker-hint setup-provider-state"
            aria-busy="false"
          >
            <button
              class="provider-option is-selected"
              type="button"
              role="radio"
              data-provider="minimax"
              aria-checked="true"
              tabindex="0"
            >MiniMax</button>
            <button
              class="provider-option"
              type="button"
              role="radio"
              data-provider="deepseek"
              aria-checked="false"
              tabindex="-1"
            >DeepSeek</button>
            <button
              class="provider-option"
              type="button"
              role="radio"
              data-provider="zhipu"
              aria-checked="false"
              tabindex="-1"
            >智谱</button>
          </div>
          <p class="sr-only" id="provider-picker-hint">使用左右方向键切换服务</p>
          <p class="setup-provider-state" id="setup-provider-state" aria-live="polite">正在检测连接状态…</p>

          <label class="setup-label" id="setup-key-label" for="setup-key-input">MiniMax API Key</label>
          <div class="setup-input-row">
            <input
              id="setup-key-input"
              class="setup-input"
              type="password"
              placeholder="sk-cp-..."
              autocomplete="off"
              autocapitalize="off"
              spellcheck="false"
              maxlength="512"
              aria-describedby="setup-security setup-error"
            />
            <button id="setup-toggle-key" class="input-action" type="button" aria-label="显示 API Key">显示</button>
          </div>

          <p class="setup-security" id="setup-security">验证和查询时只发送至 MiniMax 官方 HTTPS 接口；Windows 使用系统凭据加密后保存在本机。</p>
          <p id="setup-error" class="setup-error" role="alert" aria-live="assertive"></p>

          <button id="setup-submit" class="setup-submit" type="submit">验证并保存</button>
          <div class="setup-actions">
            <button class="text-btn" type="button" id="setup-help">获取密钥</button>
            <button class="text-btn hidden" type="button" id="setup-clear">移除本机密钥</button>
            <button class="text-btn" type="button" id="setup-cancel">稍后</button>
          </div>
        </form>
      </section>
    </div>

    <script type="module" src="main.js"></script>
  </body>
</html>

<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claude Usage Widget</title>
  </head>
  <body>
    <div id="widget" data-tauri-drag-region>

      <header data-tauri-drag-region>
        <span class="title" data-tauri-drag-region>Claude Usage</span>
        <div class="header-actions">
          <button id="btn-refresh" title="刷新">⟳</button>
          <button id="btn-collapse" title="折叠/展开">−</button>
          <button id="btn-close" title="关闭">×</button>
        </div>
      </header>

      <main id="content">
        <section class="bar-block" id="block-5h">
          <div class="bar-label">
            <span class="left">5 小时</span>
            <span class="right" id="fiveHour-pct">—</span>
          </div>
          <div class="bar-bg">
            <div class="bar-fill" id="fiveHour-fill" style="width:0%"></div>
          </div>
          <div class="bar-sub" id="fiveHour-resets">—</div>
        </section>

        <section class="bar-block" id="block-7d">
          <div class="bar-label">
            <span class="left">7 天</span>
            <span class="right" id="sevenDay-pct">—</span>
          </div>
          <div class="bar-bg">
            <div class="bar-fill" id="sevenDay-fill" style="width:0%"></div>
          </div>
          <div class="bar-sub" id="sevenDay-resets">—</div>
        </section>

        <div id="model-block">
          模型 <span class="mname" id="model-name">—</span>
        </div>

        <details id="block-models">
          <summary>各模型剩余 %</summary>
          <div id="models-list"></div>
        </details>

        <div class="status" id="status">连接中…</div>
      </main>

      <!-- 首次启动 setup 向导 -->
      <div class="setup-overlay hidden" id="setup-overlay">
        <div class="setup-eyebrow">Claude Usage Widget</div>
        <div class="setup-title">连接 MiniMax</div>
        <div class="setup-sub">需要你的 MiniMax sk-cp key。<br>仅本机加密存储，不会上传。</div>
        <input
          id="setup-key-input"
          class="setup-input"
          type="password"
          placeholder="sk-cp-..."
          autocomplete="off"
          spellcheck="false"
        />
        <button id="setup-submit" class="setup-btn">连接并保存</button>
        <div id="setup-error" class="setup-error"></div>
        <a class="setup-link" href="#" id="setup-help">如何获取 sk-cp key？</a>
      </div>

    </div>

    <script src="main.js" defer></script>
  </body>
</html>

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm ci

      - name: cargo fmt --check
        working-directory: src-tauri
        run: cargo fmt --check --manifest-path Cargo.toml

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --locked --manifest-path Cargo.toml --all-targets -- -D warnings

      - name: cargo test
        working-directory: src-tauri
        run: cargo test --locked --manifest-path Cargo.toml

      - name: npm test
        run: npm test

      - name: tauri build
        working-directory: src-tauri
        run: |
          cargo build --locked --release --manifest-path Cargo.toml
          # bundle installer generation runs as part of `npm run tauri build`
          npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
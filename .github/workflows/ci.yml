name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.97.0
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Frontend syntax check
        run: npm run check

      - name: cargo fmt --check
        working-directory: src-tauri
        run: cargo fmt --check --manifest-path Cargo.toml

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --locked --manifest-path Cargo.toml --all-targets -- -D warnings

      - name: cargo test
        working-directory: src-tauri
        run: cargo test --locked --manifest-path Cargo.toml

      - name: npm test
        run: npm test

      - name: tauri build
        run: npm run tauri -- build --ci --bundles msi,nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
